<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>恋爱AI聊天模拟器</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="passwordScreen" class="password-screen">
    <div class="password-card">
        <div class="password-icon">💕</div>
        <h1 class="password-title">恋爱AI聊天模拟器</h1>
        <p class="password-desc">和你的专属AI来一场温暖的对话吧</p>
        <div class="password-input-group">
            <input type="password" id="passwordInput" class="password-input" placeholder="输入密码..." maxlength="20" autocomplete="off">
            <button id="passwordSubmit" class="btn-primary">✨ 进入</button>
        </div>
        <div id="passwordError" class="password-error" style="display:none;">密码错误，请重试</div>
        <p class="password-warning">⚠️ 前端验证仅为基本保护，生产环境请使用后端认证。</p>
    </div>
</div>

<div id="appContainer" class="app-container" style="display:none;">
    <div class="top-bar">
        <span class="app-title" id="appTitle">💕 恋爱AI</span>
        <button id="settingsBtn" class="icon-btn" title="设置">⚙️</button>
    </div>
    <div class="game-container" id="gameWindow">
        <div class="avatar-section">
            <div class="character-img" id="charImg"></div>
            <div class="avatar-name" id="avatarName">小暖</div>
            <div class="typing-indicator" id="typingIndicator" style="display:none;">
                <span></span><span></span><span></span>
            </div>
            <div class="online-dot"></div>
        </div>
        <div class="scene-selector" id="sceneSelector"></div>
        <div class="chat-area" id="chatBox"></div>
        <div class="input-box">
            <textarea id="userInput" class="chat-input" placeholder="写下你的心情..." rows="1" maxlength="500"></textarea>
            <button class="send-btn" id="sendBtn" title="发送">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
            </button>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>⚙️ 设置</h3>
            <button class="close-btn" id="closeSettings">✕</button>
        </div>
        <div class="modal-body">
            <div class="setting-group">
                <label class="setting-label">启用 GPT API</label>
                <label class="toggle"><input type="checkbox" id="gptToggle"><span class="toggle-slider"></span></label>
            </div>
            <div id="gptSettings" style="display:none;">
                <div class="setting-group">
                    <label class="setting-label">API Key（服务端 .env 配置）</label>
                    <input type="text" id="gptApiKey" class="setting-input" placeholder="由后端处理" disabled style="opacity:0.6;">
                </div>
                <div class="setting-group">
                    <label class="setting-label">API URL</label>
                    <input type="text" id="gptApiUrl" class="setting-input" value="/api/chat">
                </div>
                <div class="setting-group">
                    <label class="setting-label">模型</label>
                    <input type="text" id="gptModel" class="setting-input" value="gpt-3.5-turbo">
                </div>
            </div>
            <div class="setting-group">
                <label class="setting-label">回复延迟 (ms)</label>
                <div class="range-row">
                    <span>最小</span>
                    <input type="range" id="delayMin" min="300" max="5000" value="800" class="range-input">
                    <span id="delayMinVal">800</span>
                    <span>最大</span>
                    <input type="range" id="delayMax" min="500" max="8000" value="2500" class="range-input">
                    <span id="delayMaxVal">2500</span>
                </div>
            </div>
            <div class="setting-group setting-actions">
                <button id="clearHistoryBtn" class="btn-danger">🗑️ 清除聊天记录</button>
                <button id="resetSettingsBtn" class="btn-secondary">🔄 恢复默认设置</button>
            </div>
            <div class="setting-about">
                <p>💕 恋爱AI聊天模拟器 v1.0</p>
                <p>温柔治愈，专属你的AI聊天体验</p>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast" style="display:none;"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
